<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="https://fonts.xz.style/serve/inter.css">
    <link rel="stylesheet" href="https://unpkg.com/papercss@1.9.2/dist/paper.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="page-viewport">
    <main class="game" aria-labelledby="title">
        <h1 id="title">Tic-Tac-Toe</h1>

        <section id="home-screen" class="screen" aria-labelledby="home-title">
            <div class="home-utility-row">
                <div id="coin-holder" data-coin-holder class="coin-holder" role="group" aria-label="Coin balance: 0">
                    <span class="coin-art" aria-hidden="true">¢</span>
                    <span id="coin-amount" data-coin-amount class="coin-amount">0000</span>
                    <span class="coin-plus" aria-hidden="true" tabindex="-1">+</span>
                </div>
                <button id="open-profile" class="profile-button" type="button" aria-label="Open profile">
                    <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false"><circle cx="24" cy="16" r="8"/><path d="M9 41c1-10 7-15 15-15s14 5 15 15"/></svg>
                </button>
            </div>
            <p id="coin-announcement" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
            <h2 id="home-title">TIC TAC TOE</h2>

            <div class="home-preview" aria-hidden="true">
                <span class="home-preview-cell home-preview-cell--x" style="--preview-delay: 0s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path class="mark-icon__stroke" d="M24 24 76 76M76 24 24 76" /></svg></span>
                <span class="home-preview-cell home-preview-cell--o" style="--preview-delay: .42s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle class="mark-icon__stroke" cx="50" cy="50" r="29" /></svg></span>
                <span class="home-preview-cell home-preview-cell--x" style="--preview-delay: .84s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path class="mark-icon__stroke" d="M24 24 76 76M76 24 24 76" /></svg></span>
                <span class="home-preview-cell home-preview-cell--o" style="--preview-delay: 1.26s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle class="mark-icon__stroke" cx="50" cy="50" r="29" /></svg></span>
                <span class="home-preview-cell home-preview-cell--x" style="--preview-delay: .21s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path class="mark-icon__stroke" d="M24 24 76 76M76 24 24 76" /></svg></span>
                <span class="home-preview-cell home-preview-cell--o" style="--preview-delay: 1.68s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle class="mark-icon__stroke" cx="50" cy="50" r="29" /></svg></span>
                <span class="home-preview-cell home-preview-cell--x" style="--preview-delay: 2.1s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path class="mark-icon__stroke" d="M24 24 76 76M76 24 24 76" /></svg></span>
                <span class="home-preview-cell home-preview-cell--x" style="--preview-delay: 2.52s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path class="mark-icon__stroke" d="M24 24 76 76M76 24 24 76" /></svg></span>
                <span class="home-preview-cell home-preview-cell--o" style="--preview-delay: 1.05s"><svg class="mark-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle class="mark-icon__stroke" cx="50" cy="50" r="29" /></svg></span>
            </div>

            <button id="open-leaderboard" class="leaderboard-entry" type="button" aria-label="Open leaderboard">
                <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                    <path d="M20 8h24v9c0 9-4 16-12 20-8-4-12-11-12-20V8Zm0 5H10v5c0 8 5 14 13 15M44 13h10v5c0 8-5 14-13 15M32 37v10m-11 7h22M25 47h14v7" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button id="open-battle-pass" class="battle-pass-entry" type="button" aria-label="Open battle pass">
                <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                    <path d="M32 6 52 14v16c0 13-8 23-20 28C20 53 12 43 12 30V14L32 6Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                    <path d="m22 32 7 7 14-15" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="start-game-wrap">
                <button id="start-game" type="button" aria-label="Play">Start game</button>
                <div class="win-streak" data-win-streak role="status" aria-live="polite" aria-atomic="true">
                    <span class="visually-hidden" data-win-streak-status>Win streak: 0 of 3</span>
                    <span class="win-streak__flames" aria-hidden="true">
                        <svg class="streak-flame" data-streak-flame viewBox="0 0 32 42" aria-hidden="true" focusable="false"><defs><linearGradient id="streak-flame-gradient-1" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#f79009"/><stop offset="1" stop-color="#d92d20"/></linearGradient></defs><path class="streak-flame__shape" style="--streak-flame-fill: url(#streak-flame-gradient-1)" d="M16 40C8.3 40 3 34.8 3 27.6c0-5.4 3.1-9.7 7.6-14.2.2 4 1.7 6.1 3.5 7.6-.2-7.4 3-13.3 8.5-19 0 6.5 6.4 10.1 6.4 18.5C29 31.5 23.8 40 16 40Z" /></svg>
                        <svg class="streak-flame" data-streak-flame viewBox="0 0 32 42" aria-hidden="true" focusable="false"><defs><linearGradient id="streak-flame-gradient-2" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#f79009"/><stop offset="1" stop-color="#d92d20"/></linearGradient></defs><path class="streak-flame__shape" style="--streak-flame-fill: url(#streak-flame-gradient-2)" d="M16 40C8.3 40 3 34.8 3 27.6c0-5.4 3.1-9.7 7.6-14.2.2 4 1.7 6.1 3.5 7.6-.2-7.4 3-13.3 8.5-19 0 6.5 6.4 10.1 6.4 18.5C29 31.5 23.8 40 16 40Z" /></svg>
                        <svg class="streak-flame" data-streak-flame viewBox="0 0 32 42" aria-hidden="true" focusable="false"><defs><linearGradient id="streak-flame-gradient-3" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#f79009"/><stop offset="1" stop-color="#d92d20"/></linearGradient></defs><path class="streak-flame__shape" style="--streak-flame-fill: url(#streak-flame-gradient-3)" d="M16 40C8.3 40 3 34.8 3 27.6c0-5.4 3.1-9.7 7.6-14.2.2 4 1.7 6.1 3.5 7.6-.2-7.4 3-13.3 8.5-19 0 6.5 6.4 10.1 6.4 18.5C29 31.5 23.8 40 16 40Z" /></svg>
                    </span>
                </div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen leaderboard-screen" aria-labelledby="leaderboard-title" hidden>
            <header class="leaderboard-header">
                <button id="leaderboard-back" type="button" aria-label="Back to home">Back</button>
                <h2 id="leaderboard-title">Leaderboard</h2>
            </header>
            <div class="leaderboard-columns" role="row" aria-label="Leaderboard columns">
                <span role="columnheader">Position</span>
                <span role="columnheader">Player</span>
                <span role="columnheader">Score</span>
            </div>
            <p id="leaderboard-message" class="leaderboard-message" hidden></p>
            <div id="leaderboard-list" class="leaderboard-list" role="table" aria-label="Weekly leaderboard"></div>
            <button id="floating-local-row" class="leaderboard-row leaderboard-row--local leaderboard-floating" type="button" aria-label="Jump to your leaderboard position" hidden></button>
        </section>

        <section id="battle-pass-screen" class="screen secondary-screen battle-pass-screen" aria-labelledby="battle-pass-title" hidden>
            <header class="screen-header">
                <button id="battle-pass-back" class="back-button" type="button" aria-label="Back to Home"><span aria-hidden="true">←</span><span>Back</span></button>
                <h2 id="battle-pass-title" tabindex="-1">Battle Pass</h2>
            </header>
            <div class="battle-pass-summary">
                <strong data-battle-pass-progress>0 / 100 points</strong>
                <span data-battle-pass-reset></span>
            </div>
            <div id="battle-pass-list" class="battle-pass-list" aria-label="Battle pass milestones"></div>
            <p id="battle-pass-announcement" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
        </section>

        <section id="profile-screen" class="screen secondary-screen" aria-labelledby="profile-title" hidden>
            <header class="screen-header">
                <button id="profile-back" class="back-button" type="button" aria-label="Back to Home"><span aria-hidden="true">←</span><span>Back</span></button>
                <h2 id="profile-title" tabindex="-1">Profile</h2>
            </header>
            <strong id="profile-name" class="profile-name"></strong>
            <dl class="stats-grid">
                <div class="stat-card"><dt>Games Played</dt><dd data-stat="games_played">0</dd></div>
                <div class="stat-card"><dt>Wins</dt><dd data-stat="wins">0</dd></div>
                <div class="stat-card"><dt>Draws</dt><dd data-stat="draws">0</dd></div>
                <div class="stat-card"><dt>Losses</dt><dd data-stat="losses">0</dd></div>
                <div class="stat-card"><dt>Moves Played</dt><dd data-stat="moves_played">0</dd></div>
                <div class="stat-card"><dt>Win Rate</dt><dd data-stat="win_rate">0%</dd></div>
            </dl>
            <button id="open-styles" class="styles-entry" type="button">Styles</button>
        </section>

        <section id="styles-screen" class="screen secondary-screen styles-screen" aria-labelledby="styles-title" hidden>
            <header class="screen-header">
                <button id="styles-back" class="back-button" type="button" aria-label="Back to Profile"><span aria-hidden="true">←</span><span>Back</span></button>
                <h2 id="styles-title" tabindex="-1">Styles</h2>
                <div id="styles-balance" class="styles-balance" role="status" aria-label="Coin balance: 0"><span class="coin-art" aria-hidden="true">¢</span><span data-styles-balance>0000</span></div>
            </header>
            <div id="styles-grid" class="styles-grid" aria-label="Game board styles"></div>
            <p id="style-announcement" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
        </section>

        <section id="game-screen" class="screen" aria-labelledby="turn-announcement" hidden>
            <div class="players" aria-label="Players">
                <div class="player-card" data-player="local" data-mark="X">
                    <div class="player-card__identity">
                        <span class="player-role">You</span>
                        <strong id="player-name">You</strong>
                    </div>
                    <strong id="player-score" class="player-score" aria-label="Your score: 0">0</strong>
                </div>
                <div class="player-card" data-player="opponent" data-mark="O" hidden>
                    <strong id="opponent-score" class="player-score" aria-label="Opponent score: 0">0</strong>
                    <div class="player-card__identity">
                        <span class="player-role">AI Opponent</span>
                        <strong id="opponent-name"></strong>
                    </div>
                </div>
            </div>
            <p id="turn-announcement" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
            <p id="status" class="status"></p>
            <div class="board" aria-label="Tic-Tac-Toe board">
                <button class="cell" type="button" data-cell="0" aria-label="Cell 1"></button>
                <button class="cell" type="button" data-cell="1" aria-label="Cell 2"></button>
                <button class="cell" type="button" data-cell="2" aria-label="Cell 3"></button>
                <button class="cell" type="button" data-cell="3" aria-label="Cell 4"></button>
                <button class="cell" type="button" data-cell="4" aria-label="Cell 5"></button>
                <button class="cell" type="button" data-cell="5" aria-label="Cell 6"></button>
                <button class="cell" type="button" data-cell="6" aria-label="Cell 7"></button>
                <button class="cell" type="button" data-cell="7" aria-label="Cell 8"></button>
                <button class="cell" type="button" data-cell="8" aria-label="Cell 9"></button>
                <span class="winning-line" data-winning-line aria-hidden="true" hidden></span>
            </div>
        </section>

        <dialog id="insufficient-dialog" aria-labelledby="insufficient-title" aria-describedby="insufficient-message">
            <h2 id="insufficient-title">Not enough coins</h2>
            <p id="insufficient-message"></p>
            <button id="insufficient-ok" type="button">OK</button>
        </dialog>

        <dialog id="result-dialog" aria-labelledby="result-message">
            <p class="result-eyebrow">Game over</p>
            <h2 id="result-message"></h2>
            <p id="result-detail"></p>
            <button id="continue" type="button">Continue</button>
        </dialog>
    </main>
    </div>
    <script type="module" src="/js/main.js"></script>
</body>
</html>
